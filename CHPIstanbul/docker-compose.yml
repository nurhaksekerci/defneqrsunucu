# PostgreSQL + Django API + Next.js (ayrı konteynerler).
# Ortam: backend/.env — API için; frontend build arg: NEXT_PUBLIC_API_URL (tarayıcıdan erişilen API adresi).
#
# Not: Yerel makinede 5432 kullanan bir PostgreSQL varsa "5432 already allocated" hatası alırsınız.
# Bu yüzden host tarafı 5433; konteyner içi API yine hostname "db" ve port 5432 kullanır.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chpistanbul
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chpistanbul"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - api_media:/app/media
    env_file:
      - ./backend/.env
    environment:
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: chpistanbul
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      # DEBUG=False iken Django varsayılanı tüm HTTP isteklerini HTTPS'e yönlendirir; tarayıcı
      # CORS preflight (OPTIONS) yönlendirmeyi kabul etmez → "Redirect is not allowed for a preflight".
      # Yerel HTTP ile Compose kullanırken kapalı tutun. Gerçek HTTPS önünde nginx vb. kullanıyorsanız
      # bu satırları kaldırın veya .env ile uyumlu ayarlayın.
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"
      # Windows TTY → konteyner stdin bazen bozuk Unicode üretir (surrogate); UTF-8 zorunlu kıl.
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      # DEBUG=False iken rapor görselleri /media/... — nginx/S3 olmadan Compose için
      SERVE_MEDIA: "True"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Tarayıcıda çalışan JS bu adrese istek atar; makinede API 8000 ise host adresi kullanın.
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  api_media:
